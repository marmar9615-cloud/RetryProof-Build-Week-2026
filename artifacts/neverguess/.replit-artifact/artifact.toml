kind = "web"
previewPath = "/"
title = "NeverGuess"
version = "1.0.0"
id = "artifacts/neverguess"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23715

[services.development]
run = "pnpm --filter @workspace/neverguess run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/neverguess", "run", "build" ]
publicDir = "artifacts/neverguess/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23715"
BASE_PATH = "/"
